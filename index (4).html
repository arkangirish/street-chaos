<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Street Chaos</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Black+Ops+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:'Rajdhani',sans-serif;}
#wrap{position:relative;width:600px;height:600px;}
canvas{display:block;border:2px solid #333;}
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#top-hud{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-start;}
.hud-panel{background:rgba(0,0,0,0.75);border:1px solid #444;padding:6px 12px;border-radius:4px;}
.hud-label{font-size:10px;letter-spacing:2px;color:#888;text-transform:uppercase;}
.hud-val{font-size:20px;font-weight:700;color:#fff;font-family:'Black Ops One',cursive;}
#wanted-panel{display:flex;flex-direction:column;align-items:center;gap:4px;}
#stars{display:flex;gap:3px;}
.star{width:16px;height:16px;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);background:#333;transition:background 0.2s;}
.star.active{background:#f80;box-shadow:0 0 6px #f80;}
.star.flashing{background:#f00;box-shadow:0 0 8px #f00;}
#health-bar-wrap{margin-top:4px;}
#health-bar{width:120px;height:8px;background:#333;border-radius:4px;overflow:hidden;border:1px solid #555;}
#health-fill{height:100%;background:linear-gradient(90deg,#0f8,#4f4);border-radius:4px;transition:width 0.15s;}
#ammo-display{display:flex;align-items:center;gap:6px;}
#weapon-name{font-size:11px;color:#f80;letter-spacing:1px;}
#minimap{position:absolute;bottom:10px;right:10px;width:110px;height:110px;background:rgba(0,0,0,0.8);border:1px solid #555;border-radius:4px;overflow:hidden;}
#minimap canvas{width:100%;height:100%;}
#message{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Black Ops One',cursive;font-size:28px;color:#f80;text-shadow:0 0 20px #f80,2px 2px 0 #000;text-align:center;opacity:0;transition:opacity 0.4s;pointer-events:none;white-space:nowrap;}
#controls-hint{position:absolute;bottom:130px;left:10px;background:rgba(0,0,0,0.6);padding:6px 10px;border-radius:4px;font-size:11px;color:#888;line-height:1.7;}
#mission-panel{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border:1px solid #f804;padding:6px 16px;border-radius:4px;display:none;text-align:center;}
#mission-title{font-size:11px;color:#f80;letter-spacing:2px;}
#mission-desc{font-size:13px;color:#fff;font-weight:600;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="600" height="600"></canvas>
  <div id="hud">
    <div id="top-hud">
      <div class="hud-panel">
        <div class="hud-label">Cash</div>
        <div class="hud-val" id="cashVal">$0</div>
      </div>
      <div class="hud-panel" id="wanted-panel">
        <div class="hud-label">Wanted</div>
        <div id="stars">
          <div class="star" id="s1"></div>
          <div class="star" id="s2"></div>
          <div class="star" id="s3"></div>
          <div class="star" id="s4"></div>
          <div class="star" id="s5"></div>
        </div>
      </div>
      <div class="hud-panel">
        <div class="hud-label">Health</div>
        <div id="health-bar-wrap"><div id="health-bar"><div id="health-fill" style="width:100%"></div></div></div>
        <div id="ammo-display" style="margin-top:4px;">
          <div class="hud-label" id="weapon-name">PISTOL</div>
          <div class="hud-val" style="font-size:14px;" id="ammoVal">∞</div>
        </div>
      </div>
    </div>
    <div id="minimap"><canvas id="miniC" width="110" height="110"></canvas></div>
    <div id="message"></div>
    <div id="controls-hint">
      WASD / Arrows — Move<br>
      Space — Shoot / Enter car<br>
      F — Exit car<br>
      1/2/3 — Switch weapon
    </div>
    <div id="mission-panel">
      <div id="mission-title">MISSION</div>
      <div id="mission-desc"></div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const miniCanvas = document.getElementById('miniC');
const mCtx = miniCanvas.getContext('2d');
const W = 600, H = 600;

// ── World size ────────────────────────────────────────────
const WORLD_W = 2400, WORLD_H = 2400;
const TILE = 40;

// ── Utility ───────────────────────────────────────────────
const rand = (a,b) => a+Math.random()*(b-a);
const randInt = (a,b) => Math.floor(rand(a,b+1));
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const dist = (a,b) => Math.hypot(a.x-b.x,a.y-b.y);
const lerp = (a,b,t) => a+(b-a)*t;
const normalizeAngle = a => { while(a>Math.PI)a-=Math.PI*2; while(a<-Math.PI)a+=Math.PI*2; return a; };

// ── Camera ────────────────────────────────────────────────
let cam = { x:0, y:0 };
function worldToScreen(wx,wy){ return {x:wx-cam.x+W/2, y:wy-cam.y+H/2}; }
function screenToWorld(sx,sy){ return {x:sx+cam.x-W/2, y:sy+cam.y-H/2}; }
function inView(wx,wy,r=40){ const s=worldToScreen(wx,wy); return s.x>-r&&s.x<W+r&&s.y>-r&&s.y<H+r; }

// ── World Map ─────────────────────────────────────────────
// Tile types: 0=road, 1=sidewalk, 2=building, 3=park, 4=water
let worldMap = [];
const COLS = Math.floor(WORLD_W/TILE);
const ROWS = Math.floor(WORLD_H/TILE);

function generateWorld() {
  worldMap = Array.from({length:ROWS}, ()=>Array(COLS).fill(0));

  // Fill with sidewalk base
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) worldMap[r][c]=1;

  // Main roads (horizontal)
  const hRoads = [5,15,25,35,45,55];
  hRoads.forEach(r=>{ for(let c=0;c<COLS;c++) for(let d=0;d<4;d++) if(r+d<ROWS) worldMap[r+d][c]=0; });

  // Main roads (vertical)
  const vRoads = [5,15,25,35,45,55];
  vRoads.forEach(c=>{ for(let r=0;r<ROWS;r++) for(let d=0;d<4;d++) if(c+d<COLS) worldMap[r][c+d]=0; });

  // Fill city blocks with buildings and parks
  for(let blockR=0;blockR<6;blockR++) {
    for(let blockC=0;blockC<6;blockC++) {
      const startR = blockR===0?0:(hRoads[blockR-1]+4);
      const startC = blockC===0?0:(vRoads[blockC-1]+4);
      const endR = hRoads[blockR]||ROWS;
      const endC = vRoads[blockC]||COLS;
      const isPark = (blockR+blockC)%3===0;
      const isWater = (blockR===2&&blockC===2)||(blockR===4&&blockC===1);
      for(let r=startR+1;r<endR-1;r++) {
        for(let c=startC+1;c<endC-1;c++) {
          if(isWater) worldMap[r][c]=4;
          else if(isPark) worldMap[r][c]=3;
          else worldMap[r][c]=2;
        }
      }
    }
  }
}
generateWorld();

// Tile colors
const TILE_COLORS = {
  0:'#2a2a2a', // road - dark asphalt
  1:'#3a3830', // sidewalk
  2:'#1a1a2a', // building base (drawn separately)
  3:'#1a3a1a', // park
  4:'#0a1a3a', // water
};

// ── Buildings ─────────────────────────────────────────────
let buildings = [];
function generateBuildings() {
  buildings = [];
  for(let blockR=0;blockR<6;blockR++) {
    for(let blockC=0;blockC<6;blockC++) {
      const startR = blockR===0?0:(5+4+(blockR-1)*10+4);
      const startC = blockC===0?0:(5+4+(blockC-1)*10+4);
      const endR = 5+blockR*10;
      const endC = 5+blockC*10;
      if(worldMap[startR+1]&&worldMap[startR+1][startC+1]===2) {
        const bw = (endC-startC-2)*TILE;
        const bh = (endR-startR-2)*TILE;
        const bx = (startC+1)*TILE;
        const by = (startR+1)*TILE;
        // Split block into multiple buildings
        const cols = randInt(1,3);
        const rows = randInt(1,3);
        for(let bi=0;bi<rows;bi++) {
          for(let bj=0;bj<cols;bj++) {
            const margin=4;
            const fw = bw/cols - margin;
            const fh = bh/rows - margin;
            if(fw<20||fh<20)continue;
            const hue = randInt(200,260);
            buildings.push({
              x: bx+bj*(bw/cols)+margin/2,
              y: by+bi*(bh/rows)+margin/2,
              w: fw, h: fh,
              color:`hsl(${hue},15%,${randInt(18,30)}%)`,
              roofColor:`hsl(${hue},20%,${randInt(35,50)}%)`,
              windows: generateWindows(bx+bj*(bw/cols)+margin/2, by+bi*(bh/rows)+margin/2, fw, fh),
              height: randInt(2,5)
            });
          }
        }
      }
    }
  }
}

function generateWindows(bx,by,bw,bh) {
  const wins=[];
  const cols=Math.floor(bw/18);
  const rows=Math.floor(bh/18);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {
    wins.push({
      x:bx+6+c*18, y:by+6+r*18,
      on:Math.random()>0.35,
      color:Math.random()>0.5?'#ffeb80':'#80c8ff'
    });
  }
  return wins;
}
generateBuildings();

// ── Particles ─────────────────────────────────────────────
let particles=[];
function spawnParticles(x,y,count,opts={}) {
  for(let i=0;i<count;i++) {
    const a=rand(0,Math.PI*2);
    const spd=rand(1,opts.maxSpd||5);
    particles.push({
      x,y,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:1, decay:opts.decay||rand(0.02,0.05),
      size:rand(2,opts.maxSize||6),
      color:opts.color||`hsl(${rand(20,50)},100%,60%)`,
      gravity:opts.gravity||0
    });
  }
}
function updateParticles(){
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.96;p.vy*=0.96;p.life-=p.decay;p.size*=0.97;});
  particles=particles.filter(p=>p.life>0&&p.size>0.3);
}
function drawParticles(){
  particles.forEach(p=>{
    if(!inView(p.x,p.y,20))return;
    const s=worldToScreen(p.x,p.y);
    ctx.save();ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=4;
    ctx.beginPath();ctx.arc(s.x,s.y,p.size,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
}

// ── Bullets ───────────────────────────────────────────────
let bullets=[];
function spawnBullet(x,y,angle,opts={}) {
  bullets.push({
    x,y,
    vx:Math.cos(angle)*(opts.speed||12),
    vy:Math.sin(angle)*(opts.speed||12),
    r:opts.r||3,
    color:opts.color||'#ff0',
    damage:opts.damage||25,
    isPlayer:opts.isPlayer||false,
    life:1,
    trail:[],
    alive:true
  });
}
function updateBullets(){
  bullets.forEach(b=>{
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>5)b.trail.shift();
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<0||b.x>WORLD_W||b.y<0||b.y>WORLD_H)b.alive=false;
    // Hit buildings
    const tc=Math.floor(b.x/TILE), tr=Math.floor(b.y/TILE);
    if(worldMap[tr]&&worldMap[tr][tc]===2){b.alive=false;spawnParticles(b.x,b.y,3,{maxSpd:3,color:'#aaa',maxSize:3});}
    if(worldMap[tr]&&worldMap[tr][tc]===4){b.alive=false;}
  });
  bullets=bullets.filter(b=>b.alive);
}
function drawBullets(){
  bullets.forEach(b=>{
    if(!inView(b.x,b.y,10))return;
    b.trail.forEach((t,i)=>{
      const s=worldToScreen(t.x,t.y);
      ctx.save();ctx.globalAlpha=(i/b.trail.length)*0.5;
      ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(s.x,s.y,b.r*(i/b.trail.length),0,Math.PI*2);ctx.fill();ctx.restore();
    });
    const s=worldToScreen(b.x,b.y);
    ctx.save();ctx.shadowColor=b.color;ctx.shadowBlur=8;
    ctx.fillStyle=b.color;ctx.beginPath();ctx.arc(s.x,s.y,b.r,0,Math.PI*2);ctx.fill();ctx.restore();
  });
}

// ── Cash Pickups ──────────────────────────────────────────
let cashPickups=[];
function spawnCash(x,y,amount){
  cashPickups.push({x,y,amount,r:10,alive:true,bob:rand(0,Math.PI*2),age:0});
}
function drawCashPickups(){
  cashPickups.forEach(p=>{
    if(!inView(p.x,p.y,20))return;
    p.age++;
    const s=worldToScreen(p.x,p.y+Math.sin(p.bob+p.age*0.05)*3);
    ctx.save();
    ctx.shadowColor='#0f0';ctx.shadowBlur=12;
    ctx.fillStyle='#0c0';
    ctx.beginPath();ctx.arc(s.x,s.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0f0';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('$',s.x,s.y);
    ctx.restore();
  });
}

// ── Weapons ───────────────────────────────────────────────
const WEAPONS=[
  {name:'PISTOL',ammo:-1,damage:25,speed:13,rate:15,color:'#ff0',r:3},
  {name:'SHOTGUN',ammo:20,damage:40,speed:11,rate:30,color:'#f80',r:4,spread:true},
  {name:'UZI',ammo:60,damage:15,speed:15,rate:4,color:'#0ff',r:2},
];

// ── Player ────────────────────────────────────────────────
const player = {
  x:600, y:600,
  vx:0, vy:0,
  angle:0,
  r:12,
  health:100,
  maxHealth:100,
  cash:0,
  inCar:null,
  weapon:0,
  shootCooldown:0,
  alive:true,
  walkFrame:0,
  invincible:0,
};

// ── Cars ──────────────────────────────────────────────────
const CAR_COLORS=['#c00','#00c','#0a0','#880','#808','#088','#c80','#08c'];
let cars=[];
function spawnCars(){
  cars=[];
  const roadTiles=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(worldMap[r][c]===0)roadTiles.push({r,c});
  for(let i=0;i<30;i++){
    const t=roadTiles[randInt(0,roadTiles.length-1)];
    const angle=Math.random()<0.5?0:Math.PI/2;
    cars.push({
      x:t.c*TILE+TILE/2, y:t.r*TILE+TILE/2,
      vx:0, vy:0,
      angle,
      w:28, h:16,
      r:16,
      color:CAR_COLORS[randInt(0,CAR_COLORS.length-1)],
      health:100,
      maxHealth:100,
      driver:null, // NPC driver or null
      occupied:false,
      smoke:0,
      id:i
    });
  }
}
spawnCars();

function drawCar(car, isPlayer=false){
  const s=worldToScreen(car.x,car.y);
  ctx.save();
  ctx.translate(s.x,s.y);
  ctx.rotate(car.angle);
  // Shadow
  ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(2,3,car.w*0.55,car.h*0.45,0,0,Math.PI*2);ctx.fill();ctx.restore();
  // Body
  ctx.fillStyle=car.health<30?'#555':car.color;
  ctx.shadowColor=isPlayer?'#fff4':car.color+'44';
  ctx.shadowBlur=8;
  ctx.beginPath();ctx.roundRect(-car.w/2,-car.h/2,car.w,car.h,5);ctx.fill();
  // Roof
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.beginPath();ctx.roundRect(-car.w*0.28,-car.h*0.38,car.w*0.56,car.h*0.76,3);ctx.fill();
  // Windows
  ctx.fillStyle='rgba(100,180,255,0.35)';
  ctx.beginPath();ctx.roundRect(-car.w*0.22,-car.h*0.32,car.w*0.44,car.h*0.64,2);ctx.fill();
  // Headlights
  ctx.fillStyle='#ffe080';ctx.shadowColor='#ff0';ctx.shadowBlur=10;
  ctx.fillRect(car.w/2-4,-car.h/2+2,4,4);
  ctx.fillRect(car.w/2-4,car.h/2-6,4,4);
  // Taillights
  ctx.fillStyle='#f00';ctx.shadowColor='#f00';
  ctx.fillRect(-car.w/2,-car.h/2+2,4,4);
  ctx.fillRect(-car.w/2,car.h/2-6,4,4);
  // Wheels
  ctx.shadowBlur=0;ctx.fillStyle='#111';
  [[-car.w*0.32,-car.h*0.55],[car.w*0.32,-car.h*0.55],[-car.w*0.32,car.h*0.55],[car.w*0.32,car.h*0.55]].forEach(([wx,wy])=>{
    ctx.beginPath();ctx.ellipse(wx,wy,5,3.5,0,0,Math.PI*2);ctx.fill();
  });
  // Damage smoke
  if(car.smoke>0){
    ctx.globalAlpha=car.smoke*0.6;ctx.fillStyle='#888';
    ctx.beginPath();ctx.arc(-car.w/2+rand(-5,5),rand(-5,5),rand(3,8),0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ── NPCs ──────────────────────────────────────────────────
let npcs=[];
function spawnNPCs(){
  npcs=[];
  const sidewalkTiles=[];
  for(let r=1;r<ROWS-1;r++)for(let c=1;c<COLS-1;c++)if(worldMap[r][c]===1)sidewalkTiles.push({r,c});
  for(let i=0;i<40;i++){
    const t=sidewalkTiles[randInt(0,sidewalkTiles.length-1)];
    const colors=['#f88','#8f8','#88f','#ff8','#f8f','#8ff'];
    npcs.push({
      x:t.c*TILE+rand(4,TILE-4), y:t.r*TILE+rand(4,TILE-4),
      angle:rand(0,Math.PI*2),
      speed:rand(0.4,0.9),
      r:8,
      health:50,
      alive:true,
      color:colors[randInt(0,colors.length-1)],
      shirtColor:colors[randInt(0,colors.length-1)],
      wanderTimer:0,
      wanderTarget:null,
      fleeing:false,
      fleeTimer:0,
      walkFrame:0,
      isEnemy:false,
    });
  }
}
spawnNPCs();

// ── Police ────────────────────────────────────────────────
let cops=[];
let wantedLevel=0;
let wantedTimer=0;
let copSpawnTimer=0;
let flashTimer=0;

function spawnCop(){
  // Spawn near player but off screen
  const angle=rand(0,Math.PI*2);
  const d=rand(350,500);
  const cx=clamp(player.x+Math.cos(angle)*d,50,WORLD_W-50);
  const cy=clamp(player.y+Math.sin(angle)*d,50,WORLD_H-50);
  const tc=Math.floor(cx/TILE),tr=Math.floor(cy/TILE);
  if(!worldMap[tr]||worldMap[tr][tc]!==0)return;
  const inCar=wantedLevel>=2&&Math.random()<0.6;
  if(inCar){
    const car={x:cx,y:cy,vx:0,vy:0,angle:rand(0,Math.PI*2),w:28,h:16,r:16,color:'#006',health:100,maxHealth:100,smoke:0};
    const cop={x:cx,y:cy,r:8,health:60,alive:true,inCar:car,angle:0,shootTimer:60,isEnemy:true,speed:2.2,color:'#00f'};
    cars.push(car);
    cops.push(cop);
  } else {
    cops.push({x:cx,y:cy,r:8,health:60,alive:true,inCar:null,angle:0,shootTimer:60,isEnemy:true,speed:1.4,color:'#44f',walkFrame:0});
  }
}

function updateCops(){
  flashTimer++;
  if(wantedLevel>0){
    wantedTimer++;
    copSpawnTimer++;
    const spawnRate=Math.max(180,400-wantedLevel*60);
    if(copSpawnTimer>spawnRate&&cops.length<wantedLevel*3){copSpawnTimer=0;spawnCop();}
  }
  cops.forEach(cop=>{
    if(!cop.alive)return;
    const dx=player.x-cop.x, dy=player.y-cop.y;
    const d=Math.hypot(dx,dy);
    const targetAngle=Math.atan2(dy,dx);
    cop.angle=lerp(cop.angle,targetAngle,0.08);
    if(cop.inCar){
      cop.inCar.angle=cop.angle;
      const spd=Math.min(cop.speed*2.5,d*0.05+1);
      cop.inCar.vx=lerp(cop.inCar.vx,Math.cos(cop.angle)*spd,0.12);
      cop.inCar.vy=lerp(cop.inCar.vy,Math.sin(cop.angle)*spd,0.12);
      cop.inCar.x+=cop.inCar.vx;cop.inCar.y+=cop.inCar.vy;
      cop.x=cop.inCar.x;cop.y=cop.inCar.y;
    } else {
      cop.walkFrame++;
      if(d>80){
        cop.x+=Math.cos(cop.angle)*cop.speed;
        cop.y+=Math.sin(cop.angle)*cop.speed;
      }
    }
    // Shoot
    cop.shootTimer--;
    if(cop.shootTimer<=0&&d<300){
      cop.shootTimer=60+randInt(0,40);
      const spread=(Math.random()-0.5)*0.25;
      spawnBullet(cop.x,cop.y,targetAngle+spread,{speed:9,damage:15,color:'#44f',r:3,isPlayer:false});
    }
    // Hit player
    if(d<cop.r+player.r+4&&player.invincible<=0&&!player.inCar){
      player.health-=0.5;
      updateHealthUI();
    }
  });
  cops=cops.filter(c=>c.alive);
}

function drawCop(cop){
  if(!inView(cop.x,cop.y,20))return;
  if(cop.inCar){drawCar(cop.inCar,false);return;}
  drawPerson(cop.x,cop.y,cop.angle,'#1a1aff','#000080',cop.walkFrame,1.1);
  // Flashing light
  if(flashTimer%20<10){
    const s=worldToScreen(cop.x,cop.y-14);
    ctx.save();ctx.shadowColor='#f00';ctx.shadowBlur=15;
    ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(s.x-4,s.y,4,0,Math.PI*2);ctx.fill();
    ctx.shadowColor='#00f';ctx.fillStyle='#00f';
    ctx.beginPath();ctx.arc(s.x+4,s.y,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
}

// ── Person drawing ────────────────────────────────────────
function drawPerson(wx,wy,angle,shirtColor,pantsColor,walkFrame,scale=1){
  if(!inView(wx,wy,20))return;
  const s=worldToScreen(wx,wy);
  ctx.save();
  ctx.translate(s.x,s.y);
  ctx.rotate(angle+Math.PI/2);
  ctx.scale(scale,scale);
  const bob=Math.sin(walkFrame*0.25)*2;
  const legSwing=Math.sin(walkFrame*0.25)*4;
  // Shadow
  ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,6,7,3,0,0,Math.PI*2);ctx.fill();ctx.restore();
  // Legs
  ctx.fillStyle=pantsColor||'#333';
  ctx.fillRect(-3,2+legSwing,5,7);
  ctx.fillRect(-3,2-legSwing,5,7);
  // Body
  ctx.fillStyle=shirtColor||'#c44';
  ctx.beginPath();ctx.roundRect(-5,-6,10,12,2);ctx.fill();
  // Arms
  ctx.fillStyle=shirtColor;
  ctx.fillRect(-8,-4+legSwing*0.5,4,8);
  ctx.fillRect(4,-4-legSwing*0.5,4,8);
  // Head
  ctx.fillStyle='#e8b870';
  ctx.beginPath();ctx.arc(0,-10+bob,5.5,0,Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(-2,-11+bob,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(2,-11+bob,1,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawPlayer(){
  if(player.inCar){drawCar(player.inCar,true);return;}
  if(player.invincible>0&&Math.floor(player.invincible/4)%2===0)return;
  drawPerson(player.x,player.y,player.angle,'#e03030','#222',player.walkFrame,1.0);
  // Weapon
  const s=worldToScreen(player.x,player.y);
  ctx.save();ctx.translate(s.x,s.y);ctx.rotate(player.angle+Math.PI/2);
  ctx.fillStyle='#888';ctx.fillRect(4,-1,10,3);
  ctx.restore();
}

// ── NPC update/draw ────────────────────────────────────────
function updateNPCs(){
  npcs.forEach(npc=>{
    if(!npc.alive)return;
    npc.walkFrame++;
    if(npc.fleeing){
      npc.fleeTimer--;
      if(npc.fleeTimer<=0)npc.fleeing=false;
      npc.x+=Math.cos(npc.angle)*npc.speed*1.5;
      npc.y+=Math.sin(npc.angle)*npc.speed*1.5;
    } else {
      npc.wanderTimer--;
      if(npc.wanderTimer<=0){
        npc.wanderTimer=randInt(60,180);
        npc.angle=rand(0,Math.PI*2);
      }
      npc.x+=Math.cos(npc.angle)*npc.speed*0.4;
      npc.y+=Math.sin(npc.angle)*npc.speed*0.4;
    }
    npc.x=clamp(npc.x,10,WORLD_W-10);
    npc.y=clamp(npc.y,10,WORLD_H-10);
    // Avoid buildings
    const tc=Math.floor(npc.x/TILE),tr=Math.floor(npc.y/TILE);
    if(worldMap[tr]&&(worldMap[tr][tc]===2||worldMap[tr][tc]===4)){
      npc.angle+=Math.PI;
      npc.x+=Math.cos(npc.angle)*8;
      npc.y+=Math.sin(npc.angle)*8;
    }
  });
}

// ── Road markings ─────────────────────────────────────────
function drawWorld(){
  // Tiles
  const startC=Math.max(0,Math.floor((cam.x-W/2)/TILE)-1);
  const endC=Math.min(COLS,Math.ceil((cam.x+W/2)/TILE)+1);
  const startR=Math.max(0,Math.floor((cam.y-H/2)/TILE)-1);
  const endR=Math.min(ROWS,Math.ceil((cam.y+H/2)/TILE)+1);

  for(let r=startR;r<endR;r++){
    for(let c=startC;c<endC;c++){
      const t=worldMap[r][c];
      const sx=(c*TILE)-cam.x+W/2;
      const sy=(r*TILE)-cam.y+H/2;
      ctx.fillStyle=TILE_COLORS[t]||'#222';
      ctx.fillRect(sx,sy,TILE+1,TILE+1);
      // Road details
      if(t===0){
        // Road lines
        ctx.strokeStyle='rgba(255,255,255,0.06)';
        ctx.lineWidth=1;
        ctx.strokeRect(sx,sy,TILE,TILE);
      }
      if(t===3){
        // Park grass texture dots
        ctx.fillStyle='rgba(0,60,0,0.4)';
        ctx.beginPath();ctx.arc(sx+10,sy+10,3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(sx+30,sy+25,4,0,Math.PI*2);ctx.fill();
      }
      if(t===4){
        // Water shimmer
        ctx.fillStyle=`rgba(0,60,120,${0.2+0.1*Math.sin(Date.now()*0.002+r+c)})`;
        ctx.fillRect(sx,sy,TILE,TILE);
      }
    }
  }

  // Road markings - center lines
  ctx.strokeStyle='rgba(255,220,0,0.25)';
  ctx.lineWidth=2;
  ctx.setLineDash([20,15]);
  // Horizontal road lines
  [5,15,25,35,45,55].forEach(roadR=>{
    const sy=(roadR+2)*TILE-cam.y+H/2;
    if(sy>-5&&sy<H+5){
      ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(W,sy);ctx.stroke();
    }
  });
  // Vertical road lines
  [5,15,25,35,45,55].forEach(roadC=>{
    const sx=(roadC+2)*TILE-cam.x+W/2;
    if(sx>-5&&sx<W+5){
      ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,H);ctx.stroke();
    }
  });
  ctx.setLineDash([]);

  // Buildings
  buildings.forEach(b=>{
    const s=worldToScreen(b.x,b.y);
    if(s.x>-b.w-20&&s.x<W+20&&s.y>-b.h-20&&s.y<H+20){
      // Building shadow
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.fillRect(s.x+4,s.y+4,b.w,b.h);
      // Building body
      ctx.fillStyle=b.color;
      ctx.fillRect(s.x,s.y,b.w,b.h);
      // Roof
      ctx.fillStyle=b.roofColor;
      ctx.fillRect(s.x+4,s.y+4,b.w-8,b.h-8);
      // Windows
      b.windows.forEach(w=>{
        const ws=worldToScreen(w.x,w.y);
        if(w.on){
          ctx.fillStyle=w.color;
          ctx.shadowColor=w.color;ctx.shadowBlur=4;
        } else {
          ctx.fillStyle='rgba(0,0,0,0.6)';ctx.shadowBlur=0;
        }
        ctx.fillRect(ws.x,ws.y,7,7);
      });
      ctx.shadowBlur=0;
    }
  });
}

// ── Input ─────────────────────────────────────────────────
const keys={};
let touchDir=null;
let touchShoot=false;
window.addEventListener('keydown',e=>{keys[e.code]=true;keys[e.key]=true;e.preventDefault&&(e.code==='Space'||e.code.startsWith('Arrow'))&&e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;keys[e.key]=false;});

// Mobile touch controls
let joystickTouch=null, actionTouch=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    if(t.clientX<W*0.5)joystickTouch={id:t.identifier,sx:t.clientX,sy:t.clientY};
    else actionTouch={id:t.identifier};
  });
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    if(joystickTouch&&t.identifier===joystickTouch.id){
      const dx=t.clientX-joystickTouch.sx;
      const dy=t.clientY-joystickTouch.sy;
      const len=Math.hypot(dx,dy);
      touchDir=len>8?{x:clamp(dx/40,-1,1),y:clamp(dy/40,-1,1)}:{x:0,y:0};
    }
  });
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    if(joystickTouch&&t.identifier===joystickTouch.id){joystickTouch=null;touchDir=null;}
    if(actionTouch&&t.identifier===actionTouch.id){actionTouch=null;}
  });
},{passive:false});

// ── Player update ─────────────────────────────────────────
function updatePlayer(){
  if(!player.alive)return;
  if(player.invincible>0)player.invincible--;

  const spd = player.inCar ? 4.5 : 2.0;
  let ax=0,ay=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']||(touchDir&&touchDir.x<-0.2))ax=-spd;
  if(keys['ArrowRight']||keys['d']||keys['D']||(touchDir&&touchDir.x>0.2))ax=spd;
  if(keys['ArrowUp']||keys['w']||keys['W']||(touchDir&&touchDir.y<-0.2))ay=-spd;
  if(keys['ArrowDown']||keys['s']||keys['S']||(touchDir&&touchDir.y>0.2))ay=spd;

  const moving=Math.abs(ax)+Math.abs(ay)>0;
  if(moving){
    player.walkFrame++;
    player.angle=Math.atan2(ay,ax);
  }

  if(player.inCar){
    const car=player.inCar;
    car.vx=lerp(car.vx,ax*1.1,0.12);
    car.vy=lerp(car.vy,ay*1.1,0.12);
    if(moving)car.angle=player.angle;
    car.x+=car.vx;car.y+=car.vy;
    player.x=car.x;player.y=car.y;
    // Car collision with buildings
    const tc=Math.floor(car.x/TILE),tr=Math.floor(car.y/TILE);
    if(worldMap[tr]&&(worldMap[tr][tc]===2||worldMap[tr][tc]===4)){
      car.x-=car.vx*2;car.y-=car.vy*2;
      car.vx*=-0.4;car.vy*=-0.4;
      player.x=car.x;player.y=car.y;
      car.health-=2;car.smoke=Math.min(1,1-car.health/100);
      spawnParticles(car.x,car.y,3,{color:'#aaa',maxSpd:2,maxSize:4});
    }
    // Run over NPCs
    npcs.forEach(npc=>{
      if(!npc.alive)return;
      if(dist(car,npc)<car.r+npc.r){
        npc.health-=5;
        if(npc.health<=0){
          npc.alive=false;
          spawnParticles(npc.x,npc.y,6,{color:'#f00',maxSpd:4});
          spawnCash(npc.x,npc.y,randInt(10,50));
          increaseWanted(1);
        }
      }
    });
  } else {
    player.vx=lerp(player.vx,ax,0.2);
    player.vy=lerp(player.vy,ay,0.2);
    player.x+=player.vx;
    player.y+=player.vy;
    // Collision with buildings/water
    const tc=Math.floor(player.x/TILE),tr=Math.floor(player.y/TILE);
    if(worldMap[tr]&&(worldMap[tr][tc]===2||worldMap[tr][tc]===4)){
      player.x-=player.vx;player.y-=player.vy;
      player.vx=0;player.vy=0;
    }
  }

  player.x=clamp(player.x,10,WORLD_W-10);
  player.y=clamp(player.y,10,WORLD_H-10);

  // Enter/exit car
  if((keys['Space']||keys[' ']||actionTouch)&&!player.inCar){
    // Try enter car
    let closest=null,closestD=50;
    cars.forEach(car=>{
      const d=dist(player,car);
      if(d<closestD){closestD=d;closest=car;}
    });
    if(closest){
      player.inCar=closest;closest.occupied=true;
      showMessage('VEHICLE ACQUIRED');
      increaseWanted(1);
    }
  }
  if(keys['KeyF']||keys['f']){
    if(player.inCar){
      player.x=player.inCar.x+30;player.y=player.inCar.y;
      player.inCar.occupied=false;
      player.inCar=null;
      keys['KeyF']=false;keys['f']=false;
    }
  }

  // Shooting
  if(player.shootCooldown>0)player.shootCooldown--;
  const shooting=(keys['Space']||keys[' ']||actionTouch)&&!player.inCar;
  if(shooting&&player.shootCooldown<=0){
    const w=WEAPONS[player.weapon];
    if(w.ammo===0){player.weapon=0;updateAmmoUI();return;}
    player.shootCooldown=w.rate;
    if(w.ammo>0){w.ammo--;updateAmmoUI();}
    if(w.spread){
      for(let i=-2;i<=2;i++) spawnBullet(player.x,player.y,player.angle+i*0.12,{...w,isPlayer:true});
    } else {
      spawnBullet(player.x,player.y,player.angle,{...w,isPlayer:true});
    }
    spawnParticles(player.x+Math.cos(player.angle)*14,player.y+Math.sin(player.angle)*14,2,{maxSpd:2,color:'#ff8',maxSize:3,decay:0.15});
  }

  // Weapon switch
  if(keys['Digit1']||keys['1'])player.weapon=0;
  if(keys['Digit2']||keys['2'])player.weapon=1;
  if(keys['Digit3']||keys['3'])player.weapon=2;
  updateAmmoUI();

  // Cash pickup
  cashPickups.forEach(p=>{
    if(!p.alive)return;
    if(dist(player,p)<player.r+p.r+8){
      p.alive=false;
      player.cash+=p.amount;
      updateCashUI();
      showMessage('+$'+p.amount);
    }
  });
  cashPickups=cashPickups.filter(p=>p.alive);

  // Weapon pickups from killed cops
  if(player.cash>500&&!WEAPONS[1].ammoPickedUp){WEAPONS[1].ammo=20;WEAPONS[1].ammoPickedUp=true;}
  if(player.cash>1500&&!WEAPONS[2].ammoPickedUp){WEAPONS[2].ammo=60;WEAPONS[2].ammoPickedUp=true;showMessage('UZI UNLOCKED!');}

  // Health regen in safe zone
  if(wantedLevel===0&&player.health<100){player.health=Math.min(100,player.health+0.02);updateHealthUI();}

  // Death
  if(player.health<=0){player.alive=false;gameOver();}
}

// ── Bullet collision ──────────────────────────────────────
function checkBulletCollisions(){
  bullets.forEach(b=>{
    if(!b.alive)return;
    // Player bullets hit NPCs
    if(b.isPlayer){
      npcs.forEach(npc=>{
        if(!npc.alive||!b.alive)return;
        if(dist(b,npc)<npc.r+b.r){
          b.alive=false;
          npc.health-=b.damage;
          npc.fleeing=true;npc.fleeTimer=180;
          npc.angle=Math.atan2(npc.y-player.y,npc.x-player.x);
          spawnParticles(b.x,b.y,4,{color:'#f44',maxSpd:3,maxSize:3});
          if(npc.health<=0){
            npc.alive=false;
            spawnParticles(npc.x,npc.y,8,{color:'#f00',maxSpd:4});
            spawnCash(npc.x,npc.y,randInt(20,80));
            increaseWanted(2);
          }
        }
      });
      // Hit cops
      cops.forEach(cop=>{
        if(!cop.alive||!b.alive)return;
        if(dist(b,cop)<cop.r+b.r){
          b.alive=false;
          cop.health-=b.damage;
          spawnParticles(b.x,b.y,4,{color:'#44f',maxSpd:3,maxSize:3});
          if(cop.health<=0){
            cop.alive=false;
            spawnParticles(cop.x,cop.y,8,{color:'#44f',maxSpd:5});
            spawnCash(cop.x,cop.y,randInt(50,150));
            increaseWanted(1);
          }
        }
      });
      // Hit cars
      cars.forEach(car=>{
        if(!b.alive||car===player.inCar)return;
        if(dist(b,car)<car.r+b.r){
          b.alive=false;
          car.health-=b.damage*0.5;
          car.smoke=Math.max(0,1-car.health/100);
          spawnParticles(b.x,b.y,3,{color:'#888',maxSpd:3,maxSize:4});
          if(car.health<=0){
            spawnParticles(car.x,car.y,20,{color:'#f80',maxSpd:6,maxSize:8});
            spawnParticles(car.x,car.y,10,{color:'#888',maxSpd:3,maxSize:5});
            spawnCash(car.x,car.y,randInt(100,300));
            increaseWanted(1);
            cars=cars.filter(c=>c!==car);
          }
        }
      });
    } else {
      // Cop bullets hit player
      if(!player.inCar&&player.invincible<=0&&dist(b,player)<player.r+b.r){
        b.alive=false;
        player.health-=b.damage;
        player.invincible=60;
        updateHealthUI();
        spawnParticles(b.x,b.y,4,{color:'#f00',maxSpd:3});
        if(player.health<=0)gameOver();
      }
      // Hit player car
      if(player.inCar&&player.invincible<=0&&dist(b,player.inCar)<player.inCar.r+b.r){
        b.alive=false;
        player.inCar.health-=b.damage*0.5;
        player.inCar.smoke=Math.max(0,1-player.inCar.health/100);
        player.health-=b.damage*0.3;
        player.invincible=20;
        updateHealthUI();
        if(player.inCar.health<=0){
          spawnParticles(player.inCar.x,player.inCar.y,20,{color:'#f80',maxSpd:6,maxSize:8});
          player.health-=40;updateHealthUI();
          cars=cars.filter(c=>c!==player.inCar);
          player.x=player.inCar.x+30;player.y=player.inCar.y;
          player.inCar=null;
          if(player.health<=0)gameOver();
        }
      }
    }
  });
}

// ── Wanted system ─────────────────────────────────────────
let wantedDecayTimer=0;
function increaseWanted(amt){
  wantedLevel=Math.min(5,wantedLevel+amt);
  wantedTimer=0;
  updateWantedUI();
  if(wantedLevel===1)showMessage('⭐ WANTED!');
  if(wantedLevel===3)showMessage('⭐⭐⭐ HEAT IS ON!');
  if(wantedLevel===5)showMessage('⭐⭐⭐⭐⭐ MAX WANTED!');
}
function updateWanted(){
  if(wantedLevel>0){
    wantedDecayTimer++;
    if(wantedDecayTimer>600){
      wantedDecayTimer=0;
      wantedLevel=Math.max(0,wantedLevel-1);
      if(wantedLevel===0){cops=[];showMessage('WANTED LEVEL CLEARED');}
      updateWantedUI();
    }
  }
}

// ── Minimap ───────────────────────────────────────────────
function drawMinimap(){
  const mW=110,mH=110;
  const scale=mW/WORLD_W;
  mCtx.fillStyle='#111';mCtx.fillRect(0,0,mW,mH);
  // Draw simplified map
  for(let r=0;r<ROWS;r+=2){
    for(let c=0;c<COLS;c+=2){
      const t=worldMap[r][c];
      mCtx.fillStyle=t===0?'#333':t===2?'#445':t===3?'#141':t===4?'#014':'#2a2820';
      mCtx.fillRect(c*TILE*scale,r*TILE*scale,TILE*scale*2+1,TILE*scale*2+1);
    }
  }
  // Cars
  cars.forEach(car=>{
    mCtx.fillStyle='#880';
    mCtx.fillRect(car.x*scale-1,car.y*scale-1,3,3);
  });
  // Cops
  cops.forEach(cop=>{
    mCtx.fillStyle='#44f';
    mCtx.fillRect(cop.x*scale-1,cop.y*scale-1,3,3);
  });
  // Player
  mCtx.fillStyle='#0f0';
  mCtx.shadowColor='#0f0';mCtx.shadowBlur=4;
  mCtx.fillRect(player.x*scale-3,player.y*scale-3,6,6);
  mCtx.shadowBlur=0;
  // View rect
  mCtx.strokeStyle='rgba(255,255,255,0.3)';mCtx.lineWidth=1;
  mCtx.strokeRect((cam.x-W/2)*scale,(cam.y-H/2)*scale,W*scale,H*scale);
}

  setTimeout(()=>{
    canvas.addEventListener('click',()=>location.reload(),{once:true});
  },2000);

// ── Screen shake ──────────────────────────────────────────
let shakeAmt=0;
function shake(a){shakeAmt=Math.max(shakeAmt,a);}

// ── Main loop ─────────────────────────────────────────────
let frame=0;
let lastWin=-1;
function loop(){
  requestAnimationFrame(loop);
  frame++;

  // Screenshake
  shakeAmt=Math.max(0,shakeAmt-0.5);
  const sx=rand(-shakeAmt,shakeAmt), sy=rand(-shakeAmt,shakeAmt);

  // Camera
  cam.x=lerp(cam.x,player.x,0.1);
  cam.y=lerp(cam.y,player.y,0.1);
  cam.x=clamp(cam.x,W/2,WORLD_W-W/2);
  cam.y=clamp(cam.y,H/2,WORLD_H-H/2);

  ctx.save();
  ctx.translate(sx,sy);

  // Draw world
  drawWorld();

  // NPCs
  if(gameState==='playing')updateNPCs();
  npcs.forEach(npc=>{ if(npc.alive&&inView(npc.x,npc.y,20)) drawPerson(npc.x,npc.y,npc.angle,npc.shirtColor,'#444',npc.walkFrame); });

  // Cars (not player's, not cop cars)
  cars.forEach(car=>{ if(car!==player.inCar&&!cops.some(c=>c.inCar===car)) drawCar(car,false); });

  // Cops
  if(gameState==='playing')updateCops();
  cops.forEach(drawCop);

  // Cash
  drawCashPickups();

  // Player
  if(gameState==='playing')updatePlayer();
  drawPlayer();

  // Bullets
  if(gameState==='playing')updateBullets();
  drawBullets();

  // Collision
  if(gameState==='playing')checkBulletCollisions();

  // Particles
  if(gameState==='playing')updateParticles();
  drawParticles();

  // Wanted
  if(gameState==='playing')updateWanted();
  updateWantedUI();

  ctx.restore();

  // Minimap
  drawMinimap();

  // Ambient window flicker
  if(frame%120===0){
    buildings.forEach(b=>{
      b.windows.forEach(w=>{if(Math.random()<0.05)w.on=!w.on;});
    });
  }
}

// ── Init message ──────────────────────────────────────────
showMessage('STREET CHAOS\nWELCOME TO THE CITY',3000);
updateCashUI();
updateAmmoUI();
updateHealthUI();
updateWantedUI();
loop();
</script>
</body>
